[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
	bodmer/TFT_eSPI @ ^2.5.43

build_flags = 
	-D USER_SETUP_LOADED=1
	-D ST7735_DRIVER=1
	-D ST7735_GREENTAB160x80=1
	-D TFT_WIDTH=128
	-D TFT_HEIGHT=160
	-D TFT_MOSI=23
	-D TFT_SCLK=18
	-D TFT_CS=14
	-D TFT_DC=27
	-D TFT_RST=26
	-D LOAD_GLCD=1
	-D SPI_FREQUENCY=27000000